<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>畢業季拍照攤位 — 顧客旅程</title>
<style>
  :root{
    --navy:#1B2E4B;
    --gold:#C9A84C;
    --bg:#FAFAFA;
    --text:#222222;
    --muted:#5b6470;
    --line:#e3e5ea;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header{
    background:var(--navy);
    color:#fff;
    padding:40px 20px 48px;
    text-align:center;
  }
  header .tag{
    display:inline-block;
    border:1px solid var(--gold);
    color:var(--gold);
    font-size:13px;
    letter-spacing:2px;
    padding:4px 14px;
    border-radius:20px;
    margin-bottom:18px;
  }
  header h1{
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
  }
  header p{
    margin-top:12px;
    color:#c3cbd8;
    font-size:15px;
    max-width:560px;
    margin-left:auto;
    margin-right:auto;
  }
  .progress-wrap{
    max-width:560px;
    margin:26px auto 0;
  }
  .progress-meta{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:#aab4c4;
    margin-bottom:8px;
  }
  .progress-meta b{color:var(--gold);}
  .progress-bar{
    height:6px;
    background:rgba(255,255,255,.15);
    border-radius:6px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0;
    background:var(--gold);
    border-radius:6px;
    transition:width .4s ease;
  }

  /* ---------- Journey ---------- */
  main{
    max-width:680px;
    margin:0 auto;
    padding:36px 18px 60px;
  }

  .step{
    position:relative;
    background:#fff;
    border:1px solid var(--line);
    border-left:4px solid var(--line);
    border-radius:14px;
    margin-bottom:14px;
    transition:border-color .25s ease, box-shadow .25s ease, transform .15s ease;
    overflow:hidden;
  }
  .step.active{
    border-color:var(--gold);
    border-left-color:var(--gold);
    box-shadow:0 8px 26px rgba(27,46,75,.12);
  }

  .step-head{
    display:flex;
    align-items:center;
    gap:14px;
    padding:18px 18px;
    cursor:pointer;
    user-select:none;
  }
  .num{
    flex:0 0 auto;
    width:38px;height:38px;
    border-radius:50%;
    background:var(--navy);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;
    font-size:16px;
    transition:background .25s ease;
  }
  .step.active .num{background:var(--gold);color:var(--navy);}
  .step.done .num{background:var(--gold);color:var(--navy);}
  .head-text{flex:1;min-width:0;}
  .head-text h3{
    font-size:17px;
    font-weight:700;
    color:var(--navy);
  }
  .head-text .desc{
    font-size:14px;
    color:var(--muted);
    margin-top:3px;
  }
  .chevron{
    flex:0 0 auto;
    color:var(--gold);
    font-size:13px;
    transition:transform .3s ease;
  }
  .step.active .chevron{transform:rotate(180deg);}

  .detail{
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease;
  }
  .detail-inner{
    padding:0 18px 20px 70px;
  }
  .step-img{
    display:block;
    width:100%;
    border-radius:10px;
    margin-bottom:14px;
    border:1px solid var(--line);
    aspect-ratio:16 / 9;
    object-fit:cover;
    background:var(--navy);
  }
  .detail-label{
    display:inline-block;
    font-size:12px;
    letter-spacing:1px;
    color:var(--gold);
    font-weight:700;
    margin-bottom:8px;
  }
  .detail ul{
    list-style:none;
  }
  .detail li{
    position:relative;
    padding-left:18px;
    margin-bottom:7px;
    font-size:14.5px;
    color:var(--text);
  }
  .detail li::before{
    content:"";
    position:absolute;
    left:0;top:10px;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--gold);
  }

  /* connector line between cards */
  .connector{
    width:2px;
    height:14px;
    background:var(--line);
    margin:-7px auto;
    position:relative;
    z-index:0;
  }

  /* ---------- Nav buttons ---------- */
  .controls{
    position:sticky;
    bottom:0;
    background:linear-gradient(to top,var(--bg) 70%,transparent);
    padding:16px 18px 22px;
    display:flex;
    gap:12px;
    max-width:680px;
    margin:0 auto;
  }
  .btn{
    flex:1;
    padding:13px 18px;
    border-radius:30px;
    border:none;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    transition:opacity .2s ease, transform .1s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn-prev{
    background:#fff;
    color:var(--navy);
    border:1px solid var(--line);
  }
  .btn-next{
    background:var(--navy);
    color:#fff;
  }
  .btn-next.finish{background:var(--gold);color:var(--navy);}
  .btn:disabled{opacity:.4;cursor:default;}

  footer{
    text-align:center;
    color:var(--muted);
    font-size:12.5px;
    padding:0 20px 30px;
  }
  footer b{color:var(--navy);}

  @media (max-width:480px){
    header h1{font-size:23px;}
    .detail-inner{padding-left:18px;}
    .head-text h3{font-size:16px;}
  }
</style>
</head>
<body>

<header>
  <span class="tag">畢業季拍照攤位</span>
  <h1>顧客旅程 ｜ 7 步驟</h1>
  <p>從學生走出校門那一刻，到他加入 LINE 帶走資訊。點任一步驟展開「設計重點」，或用下方按鈕一步步走完。</p>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span>旅程進度</span>
      <span><b id="progNum">0</b> / 7</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  </div>
</header>

<main id="journey"></main>

<div class="controls">
  <button class="btn btn-prev" id="prevBtn" disabled>← 上一步</button>
  <button class="btn btn-next" id="nextBtn">開始旅程 →</button>
</div>

<footer>
  核心提醒：照片與包裝要好看到學生<b>願意主動發限動</b> — 那才是真正的廣告版位。
</footer>

<script>
const steps = [
  {
    title: "遠處看到，停下來",
    desc: "學生走出校門，遠遠看到攤位，被吸引停下來。",
    img: "畢業拍照-設計/step1-banner.jpg",
    imgAlt: "校門口白牆前的深藍易拉展，學生停下抬頭看",
    points: [
      "看板要在 10 公尺外就看得到。",
      "深色背景在學校白牆前跳出來。",
      "主訴求只有一句：「免費畢業拍照」。"
    ]
  },
  {
    title: "上前了解，登記報名",
    desc: "學生走近，了解活動，填報名表或掃 QR Code。",
    img: "畢業拍照-設計/step2-signup.png",
    imgAlt: "工作人員主動招呼，學生掃 QR Code 報名",
    points: [
      "報名流程要在 30 秒內完成。",
      "桌上有立牌說明等候時間。",
      "現場工作人員主動搭話，不站著等人來。"
    ]
  },
  {
    title: "等候",
    desc: "學生等待輪到自己。",
    img: "畢業拍照-設計/step3-waiting.jpg",
    imgAlt: "有設計感的等候區，WAIT TIME 立牌，學生輕鬆聊天",
    points: [
      "等候區要有設計，讓人不無聊。",
      "可以看其他人拍照的過程。",
      "等候本身也是體驗的一部分。"
    ]
  },
  {
    title: "拍照",
    desc: "進入拍照區，在背景板前拍照。",
    img: "畢業拍照-設計/step4-photobooth.jpg",
    imgAlt: "深藍 CLASS OF 2025 背景板 + 環形補光燈的專業拍照區",
    points: [
      "背景板夠專業：深色底 + CLASS OF 2025 大字。",
      "地面有站位標記，學生知道站哪裡最好看。",
      "補光燈讓照片好看；道具限 3 種以內。"
    ]
  },
  {
    title: "收到照片",
    desc: "照片現場印出，裝進品牌信封交給學生。",
    img: "畢業拍照-設計/step5-envelope.jpg",
    imgAlt: "手寫感「給未來高中生的你」品牌信封，照片露出一角",
    points: [
      "信封是體驗的高潮，不只是一張紙。",
      "霧白底 + 深藍文字 + 手寫感字體「給未來高中生的你」。",
      "學生拿著信封會想拍照發限動。"
    ]
  },
  {
    title: "DIY 放照片進信封",
    desc: "學生自己把照片放進信封，可以加上扣環掛在書包。",
    img: "畢業拍照-設計/step6-diy.png",
    imgAlt: "學生把照片放進品牌信封，桌上有金色扣環",
    points: [
      "動手做增加參與感。",
      "讓學生多停留 2–3 分鐘。",
      "這個動作本身會讓學生更記得這個體驗。"
    ]
  },
  {
    title: "加入 LINE，帶走資訊",
    desc: "離開前掃 QR Code 加入 LINE 官方帳號，看到公告上已有其他人加入。",
    img: "畢業拍照-設計/step7-line.png",
    imgAlt: "學生掃 LINE QR Code，看板顯示「已有多人加入」社群證明",
    points: [
      "社群證明（「已有 XX 人加入」）降低心理門檻。",
      "這是整個旅程的轉換點。",
      "從體驗者變成潛在學員。"
    ]
  }
];

const journey = document.getElementById('journey');
let current = -1; // -1 = 尚未開始

steps.forEach((s, i) => {
  if (i > 0) {
    const c = document.createElement('div');
    c.className = 'connector';
    journey.appendChild(c);
  }
  const el = document.createElement('div');
  el.className = 'step';
  el.dataset.index = i;
  el.innerHTML = `
    <div class="step-head">
      <div class="num">${i + 1}</div>
      <div class="head-text">
        <h3>${s.title}</h3>
        <div class="desc">${s.desc}</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="detail">
      <div class="detail-inner">
        ${s.img ? `<img class="step-img" src="${s.img}" alt="${s.imgAlt || ''}" loading="lazy">` : ''}
        <span class="detail-label">設計重點 ｜ 為什麼這樣設計</span>
        <ul>${s.points.map(p => `<li>${p}</li>`).join('')}</ul>
      </div>
    </div>`;
  el.querySelector('.step-head').addEventListener('click', () => select(i));
  journey.appendChild(el);
});

const stepEls = [...document.querySelectorAll('.step')];
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progFill = document.getElementById('progFill');
const progNum = document.getElementById('progNum');

function setOpen(el, open) {
  const d = el.querySelector('.detail');
  d.style.maxHeight = open ? d.scrollHeight + 'px' : '0';
}

function select(i, scroll = false) {
  current = i;
  stepEls.forEach((el, idx) => {
    const active = idx === i;
    el.classList.toggle('active', active);
    el.classList.toggle('done', idx < i);
    setOpen(el, active);
  });
  if (scroll && stepEls[i]) {
    stepEls[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  updateUI();
}

function updateUI() {
  const reached = current + 1;
  progNum.textContent = Math.max(0, reached);
  progFill.style.width = (Math.max(0, reached) / steps.length * 100) + '%';

  prevBtn.disabled = current <= 0;
  if (current >= steps.length - 1) {
    nextBtn.textContent = '重新開始 ↺';
    nextBtn.classList.add('finish');
  } else if (current < 0) {
    nextBtn.textContent = '開始旅程 →';
    nextBtn.classList.remove('finish');
  } else {
    nextBtn.textContent = '下一步 →';
    nextBtn.classList.remove('finish');
  }
}

nextBtn.addEventListener('click', () => {
  if (current >= steps.length - 1) { select(0, true); return; }
  select(current + 1, true);
});
prevBtn.addEventListener('click', () => {
  if (current > 0) select(current - 1, true);
});

// keep open card height correct on resize
window.addEventListener('resize', () => {
  if (current >= 0) setOpen(stepEls[current], true);
});

// recompute open height once images finish loading (async load can cut off the panel)
document.querySelectorAll('.step-img').forEach(img => {
  img.addEventListener('load', () => {
    const step = img.closest('.step');
    if (step && step.classList.contains('active')) setOpen(step, true);
  });
});

updateUI();
</script>
</body>
</html>
